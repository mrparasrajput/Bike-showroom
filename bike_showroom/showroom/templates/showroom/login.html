<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BikeZone CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d00;
            --dark: #0d0d0d;
            --dark-2: #1a1a1a;
            --dark-3: #242424;
            --border: #333;
            --text: #e8e8e8;
            --text-muted: #888;
        }
        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-card {
            background: var(--dark-2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
        }
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand-icon {
            width: 64px; height: 64px;
            background: var(--primary);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
            margin: 0 auto 16px;
        }
        .brand-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 32px;
            font-weight: 700;
        }
        .brand-tagline {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .form-control {
            background: var(--dark-3);
            border-color: var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 10px;
        }
        .form-control:focus {
            background: var(--dark-3);
            border-color: var(--primary);
            color: var(--text);
            box-shadow: 0 0 0 3px rgba(255,77,0,0.15);
        }
        .form-control::placeholder { color: var(--text-muted); }
        .form-label { color: var(--text-muted); font-size: 12px; font-weight: 500; }
        .btn-login {
            background: var(--primary);
            color: white;
            border: none;
            padding: 13px;
            border-radius: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 1px;
            width: 100%;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #cc3d00; color: white; }
        .errorlist { color: #ff4d4d; font-size: 12px; list-style: none; padding: 0; margin-top: 4px; }
        .divider { text-align: center; color: var(--text-muted); font-size: 12px; margin: 16px 0; }
        .demo-info {
            background: rgba(255,77,0,0.08);
            border: 1px solid rgba(255,77,0,0.2);
            border-radius: 10px;
            padding: 14px;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 20px;
        }
        .demo-info strong { color: var(--primary); }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="brand">
            <div class="brand-icon">🏍️</div>
            <div class="brand-name">BikeZone</div>
            <div class="brand-tagline">Showroom Management System</div>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger" style="background:rgba(255,77,77,.1);color:#ff4d4d;border:none;border-radius:10px;font-size:13px;">
            Invalid username or password.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">USERNAME</label>
                {{ form.username }}
            </div>
            <div class="mb-4">
                <label class="form-label">PASSWORD</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn-login">SIGN IN</button>
        </form>

        <div class="demo-info">
            <strong>🔑 Demo Access:</strong> Username: <strong>admin</strong> / Password: <strong>admin123</strong>
            <br>Run <code>python manage.py setup_demo</code> to create demo data
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
